<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>You're My Universe</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}
h1{
    text-align:center;
    font-size:50px;
    margin-top:40px;
}
p{
    text-align:center;
    font-size:20px;
}
#stars, #planets{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-2;
}
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    opacity:0;
    animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
    from {opacity:0;}
    to {opacity:1;}
}
.planet{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, #ffb347, #ffcc33);
    opacity:0.7;
}
#game{
    margin-top:40px;
    text-align:center;
}
#gameArea{
    position:relative;
    width:80%;
    height:400px;
    margin:auto;
    border:2px solid white;
    border-radius:10px;
    overflow:hidden;
    background:radial-gradient(circle at 50% 50%, #000000, #0a0a0a, #000000);
}
.spaceship{
    position:absolute;
    font-size:30px;
    left:45%;
    top:80%;
    user-select:none;
}
.gameHeart{
    position:absolute;
    font-size:25px;
    user-select:none;
}
button{
    padding:10px 20px;
    font-size:16px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#e84393;
    color:white;
    cursor:pointer;
}
.loveMessage{
    display:none;
    position:fixed;
    top:20%;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:20px;
    border:2px solid #e84393;
    border-radius:10px;
    font-size:24px;
    color:#ff6b81;
    z-index:10;
    text-align:center;
}
</style>
</head>
<body>

<h1>🌌 You're My Universe 🌌</h1>
<p>Out of billions of stars in the universe, you're my favorite one.</p>

<div id="stars"></div>
<div id="planets"></div>

<div id="game">
<h2>💖 Collect the Hearts Game 💖</h2>
<p>Use arrow keys to move your spaceship and collect hearts!</p>
<p>Score: <span id="score">0</span></p>

<div id="gameArea">
    <div class="spaceship">🚀</div>
</div>

<button onclick="startGame()">Start Game</button>
</div>

<div id="loveMessage" class="loveMessage">I love you more than all the stars in the universe! ❤️</div>

<script>
// Background stars
const starCount = 100;
const starsContainer = document.getElementById("stars");
for(let i=0;i<starCount;i++){
    let star = document.createElement("div");
    star.classList.add("star");
    star.style.left = Math.random()*100+"%";
    star.style.top = Math.random()*100+"%";
    star.style.width = Math.random()*3+1+"px";
    star.style.height = star.style.width;
    star.style.animationDuration = (Math.random()*3+1)+"s";
    starsContainer.appendChild(star);
    let dx = (Math.random()-0.5)/2;
    let dy = (Math.random()-0.5)/2;
    setInterval(()=>{
        let x = parseFloat(star.style.left);
        let y = parseFloat(star.style.top);
        x += dx;
        y += dy;
        if(x<0) x=100; if(x>100)x=0;
        if(y<0) y=100; if(y>100)y=0;
        star.style.left = x+"%";
        star.style.top = y+"%";
    },100);
}

// Floating planets
const planetCount = 5;
const planetsContainer = document.getElementById("planets");
for(let i=0;i<planetCount;i++){
    let planet = document.createElement("div");
    planet.classList.add("planet");
    planet.style.left = Math.random()*90+"%";
    planet.style.top = Math.random()*80+"%";
    planet.style.width = 40 + Math.random()*30 + "px";
    planet.style.height = planet.style.width;
    planetsContainer.appendChild(planet);
    let dx = (Math.random()-0.5)/3;
    let dy = (Math.random()-0.5)/3;
    setInterval(()=>{
        let x = parseFloat(planet.style.left);
        let y = parseFloat(planet.style.top);
        x += dx;
        y += dy;
        if(x<0)x=100; if(x>100)x=0;
        if(y<0)y=100; if(y>100)y=0;
        planet.style.left = x+"%";
        planet.style.top = y+"%";
    },100);
}

// Spaceship controls
const spaceship = document.querySelector(".spaceship");
const keys = {};
document.addEventListener("keydown",(e)=>{keys[e.key]=true;});
document.addEventListener("keyup",(e)=>{keys[e.key]=false;});

function moveSpaceship(){
    let left = parseFloat(spaceship.style.left);
    let top = parseFloat(spaceship.style.top);
    const speed = 10;
    if(keys["ArrowLeft"] && left>0) left -= speed;
    if(keys["ArrowRight"] && left<gameArea.clientWidth-30) left += speed;
    if(keys["ArrowUp"] && top>0) top -= speed;
    if(keys["ArrowDown"] && top<gameArea.clientHeight-30) top += speed;
    spaceship.style.left = left+"px";
    spaceship.style.top = top+"px";
}

// Hearts spawn
const gameArea = document.getElementById("gameArea");
let score = 0;

function spawnHeart(){
    let heart = document.createElement("div");
    heart.classList.add("gameHeart");
    heart.innerHTML = "💖";
    heart.style.left = Math.random()*(gameArea.clientWidth-30)+"px";
    heart.style.top = Math.random()*(gameArea.clientHeight-30)+"px";
    gameArea.appendChild(heart);
    setTimeout(()=>{if(heart.parentNode) heart.remove();},3000);
}

// Collision detection
function checkCollision(){
    const hearts = document.querySelectorAll(".gameHeart");
    const shipRect = spaceship.getBoundingClientRect();
    hearts.forEach(heart=>{
        const heartRect = heart.getBoundingClientRect();
        if(!(shipRect.right<heartRect.left || 
             shipRect.left>heartRect.right || 
             shipRect.bottom<heartRect.top || 
             shipRect.top>heartRect.bottom)){
            score++;
            document.getElementById("score").innerText = score;
            heart.remove();
            showLoveMessage(score);
        }
    });
}

// Love messages
const messages = [
    {score:5,text:"You make my heart soar! 💕"},
    {score:10,text:"I love you to the moon and back! 🌙"},
    {score:15,text:"You are my entire universe! 🌌"}
];
function showLoveMessage(score){
    messages.forEach(msg=>{
        if(score===msg.score){
            const el = document.getElementById("loveMessage");
            el.innerText = msg.text;
            el.style.display = "block";
            setTimeout(()=>{el.style.display="none";},3000);
        }
    });
}

// Start game
let gameInterval;
function startGame(){
    score=0;
    document.getElementById("score").innerText = score;
    clearInterval(gameInterval);
    gameInterval = setInterval(()=>{
        spawnHeart();
        moveSpaceship();
        checkCollision();
    },100);
}
</script>
</body>
</html>
