<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#87ceeb">
<title>Mi Amor Dino Matching 💚🃏</title>
<style>
html, body {
  height: 100%;
  margin: 0;
}

body{
  font-family:Arial,sans-serif;
  text-align:center;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background: linear-gradient(-45deg, #87ceeb, #bde0fe, #a8dadc, #cde7ff);
  background-size: 400% 400%;
  animation: skyGradient 15s ease infinite;
  transition: background 0.5s ease, color 0.5s ease;
}

@keyframes skyGradient {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

body.dark{
  background: linear-gradient(-45deg, #020617, #0f172a, #1e293b, #0b3d2e);
  background-size:400% 400%;
  animation: skyGradient 15s ease infinite;
  color:white;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:20px;
  background:#52b788;
  color:white;
  margin:6px;
}

h1{color:#2d6a4f;}
body.dark h1{color:#95d5b2;}

/* Background Layer */
.background-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.cloud{
  position:absolute;
  font-size:2rem;
  opacity:0.6;
  animation:cloudMove 60s linear infinite;
}

@keyframes cloudMove{
  from{transform:translateX(-20vw);} 
  to{transform:translateX(120vw);} 
}

.floating{
  position:absolute;
  font-size:2rem;
  opacity:0.3;
  animation-duration:35s;
  animation-iteration-count:infinite;
  animation-timing-function:linear;
}
.float-right{animation-name:floatRight;}
.float-left{animation-name:floatLeft;}

@keyframes floatRight{
  from{transform:translateX(-20vw);} 
  to{transform:translateX(120vw);} 
}
@keyframes floatLeft{
  from{transform:translateX(120vw);} 
  to{transform:translateX(-20vw);} 
}

/* Stars (Twinkle Night Mode) */
.star{
  position:absolute;
  color:white;
  font-size:0.8rem;
  opacity:0;
  animation:twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{opacity:0;}
  50%{opacity:1;}
}

/* Game */
.game-container{
  position:relative;
  z-index:2;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px);} 
  to{opacity:1; transform:translateY(0);} 
}

.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  max-width:95vw;
  width:400px;
  margin:20px auto;
}

.card{
  background:#52b788;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  font-size:1.6rem;
  cursor:pointer;
  transition:0.3s;
}

.card.flipped{
  background:#ffffff;
  transform:scale(1.05);
}

.win{
  color:gold;
  font-size:1.4rem;
  margin-top:10px;
}

/* Secret Ending Screen */
#endingScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  color:white;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  padding:20px;
}
</style>
</head>
<body>

<button onclick="toggleDark()">Toggle Night Mode 🌙</button>
<button onclick="restartGame()">Restart Game 🔄</button>
<button onclick="showEnding()">Secret 💖</button>

<h1>For Mi Amor 💚</h1>

<div class="background-layer" id="background">
  <div class="cloud" style="top:10%;">☁️</div>
  <div class="cloud" style="top:25%; animation-delay:20s;">☁️</div>

  <div class="floating float-right" style="top:15%;">🦕</div>
  <div class="floating float-left" style="top:30%;">🦖</div>
  <div class="floating float-right" style="top:45%;">🦕</div>
  <div class="floating float-left" style="top:60%;">🦖</div>
</div>

<div class="game-container">
  <h2>Dino Matching Game 🃏</h2>
  <div class="cards" id="cards"></div>
  <div id="status"></div>
</div>

<div id="endingScreen">
  <h1>💖 For You, Mi Amor 💖</h1>
  <p>You are my favorite adventure in every universe.</p>
  <p>Thank you for playing in my little dino world 🦖✨</p>
  <button onclick="closeEnding()">Close</button>
</div>

<script>
function toggleDark(){
  document.body.classList.toggle('dark');
  createStars();
}

function createStars(){
  const bg=document.getElementById('background');
  if(document.body.classList.contains('dark')){
    for(let i=0;i<40;i++){
      const star=document.createElement('div');
      star.className='star';
      star.innerText='✦';
      star.style.left=Math.random()*100+'vw';
      star.style.top=Math.random()*100+'vh';
      star.style.animationDelay=Math.random()*3+'s';
      bg.appendChild(star);
    }
  }
}

function showEnding(){
  document.getElementById('endingScreen').style.display='flex';
}

function closeEnding(){
  document.getElementById('endingScreen').style.display='none';
}

const dinos=["🦖","🦕","🌋","🌿","🦖","🦕","🌋","🌿"];
let first=null;
let matchedPairs=0;

function shuffle(array){
  return [...array].sort(()=>Math.random()-0.5);
}

function initCards(){
  const container=document.getElementById('cards');
  container.innerHTML='';
  first=null;
  matchedPairs=0;
  document.getElementById('status').innerHTML='';

  const shuffled=shuffle(dinos);

  shuffled.forEach(value=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.value=value;
    card.innerText='❓';
    card.onclick=()=>flip(card);
    container.appendChild(card);
  });
}

function flip(card){
  if(card.classList.contains('flipped')) return;

  card.classList.add('flipped');
  card.innerText=card.dataset.value;

  if(!first){
    first=card;
    return;
  }

  if(first.dataset.value===card.dataset.value){
    matchedPairs++;
    first=null;

    if(matchedPairs===4){
      document.getElementById('status').innerHTML='<div class="win">You Win, Mi Amor! 💖🦖</div>';
    }
  } else {
    const prev=first;
    setTimeout(()=>{
      if(prev){
        prev.innerText='❓';
        prev.classList.remove('flipped');
      }
      card.innerText='❓';
      card.classList.remove('flipped');
      first=null;
    },700);
  }
}

function restartGame(){
  initCards();
}

initCards();
</script>

</body>
</html>
