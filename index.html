<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0b0c2c">
<title>Mi Amor Night Sky 🌌💖</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: linear-gradient(-45deg, #0b0c2c, #1a1b48, #0b0c2c, #1f204f);
  background-size: 400% 400%;
  animation: skyGradient 20s ease infinite;
  font-family: Arial, sans-serif;
  color: #fff;
  text-align: center;
  overflow-x: hidden;
}

@keyframes skyGradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

h1 {margin-top: 20px; font-size: 2rem; color: #f5f5f5;}
h2 {margin-top: 15px; font-size: 1.5rem; color: #ffd700;}
p {margin: 10px 20px; font-size: 1rem; line-height: 1.5; color: #e0e0ff;}

/* Background Layers */
.background-layer {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* Stars */
.star {
  position: absolute;
  color: #fff;
  font-size: 0.8rem;
  opacity: 0;
  animation: twinkle 3s infinite ease-in-out;
  cursor: pointer;
  user-select: none;
}
.star:hover {transform: scale(1.3);}
.star:active {transform: scale(1.5); color: #ffd700;}

@keyframes twinkle {
  0%,100% {opacity:0;}
  50% {opacity:1;}
}

/* Floating Planets / Elements */
.floating {
  position: absolute;
  font-size: 2rem;
  opacity: 0.3;
  animation-duration: 35s;
  animation-iteration-count: infinite;
  animation-timing-function: linear;
}
.float-right {animation-name: floatRight;}
.float-left {animation-name: floatLeft;}

@keyframes floatRight {
  from {transform: translateX(-20vw);}
  to {transform: translateX(120vw);}
}
@keyframes floatLeft {
  from {transform: translateX(120vw);}
  to {transform: translateX(-20vw);}
}

/* Content Section */
.content-container {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
  animation: fadeIn 1s ease;
  padding-top: 60px;
  min-height: 100vh;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* Fact Boxes */
.fact {
  background: rgba(10, 12, 40, 0.6);
  border-radius: 12px;
  padding: 15px 20px;
  margin: 10px;
  max-width: 90%;
  text-align: left;
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
  transition: transform 0.3s;
}
.fact:hover {transform: scale(1.03);}

/* Tooltip for interactive stars */
.tooltip {
  position: absolute;
  background: rgba(0,0,20,0.9);
  color: #ffd700;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 0.9rem;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 3;
}
</style>
</head>
<body>

<h1>Mi Amor Night Sky 🌌</h1>

<div class="background-layer" id="background">
  <div class="floating float-right" style="top:15%;">🌟</div>
  <div class="floating float-left" style="top:30%;">🌙</div>
  <div class="floating float-right" style="top:45%;">✨</div>
  <div class="floating float-left" style="top:60%;">🌟</div>
</div>

<div class="content-container" id="content">
  <h2>Stars & Night Facts for Mi Amor 💖</h2>
  <div id="facts"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// Create twinkling stars dynamically
const background = document.getElementById('background');
const tooltip = document.getElementById('tooltip');

function createStars(count=80){
  for(let i=0;i<count;i++){
    const star = document.createElement('div');
    star.className = 'star';
    star.innerText = '✦';
    star.style.left = Math.random()*100 + 'vw';
    star.style.top = Math.random()*100 + 'vh';
    star.style.fontSize = (0.5 + Math.random()*1.5) + 'rem';
    star.style.animationDelay = Math.random()*3 + 's';
    
    // Add interactive facts for some stars
    const starFacts = [
      "✨ You shine as bright as the stars!",
      "🌙 Your birthday moon brings intuition.",
      "⭐ Stars have been lighting your nights since 2002.",
      "🌠 The Delta Aquariids meteors were active near your birth.",
      "💫 Twinkle twinkle, your cosmic energy shines."
    ];
    star.addEventListener('click', (e)=>{
      const fact = starFacts[Math.floor(Math.random()*starFacts.length)];
      tooltip.innerText = fact;
      tooltip.style.left = e.clientX + 10 + 'px';
      tooltip.style.top = e.clientY - 30 + 'px';
      tooltip.style.opacity = 1;
      tooltip.style.transform = 'scale(1.1)';
      setTimeout(()=>{tooltip.style.opacity=0; tooltip.style.transform='scale(1)';}, 2000);
    });
    
    background.appendChild(star);
  }
}

createStars();

// Star and night facts based on July 19, 2002
const factsData = [
  "🌌 You were born under the star sign Cancer (June 21 - July 22), ruled by the Moon.",
  "🌙 Your Moon sign on July 19, 2002 is Aquarius, symbolizing intuition and imagination.",
  "✨ The Sun was in Cancer, giving you strong empathy and nurturing energy.",
  "⭐ The night sky on your birthday had constellations like Sagittarius and Scorpio visible in the summer sky.",
  "🌠 In 2002, there was a notable meteor shower from the Delta Aquariids visible in July night skies.",
  "💫 Stars you were born under have been shining for millions of years—connecting your birth to the cosmos.",
  "🌌 The Milky Way was prominently visible in dark summer skies that night."
];

const factsContainer = document.getElementById('facts');
factsData.forEach(f=>{
  const div = document.createElement('div');
  div.className='fact';
  div.innerText=f;
  factsContainer.appendChild(div);
});
</script>

</body>
</html>
